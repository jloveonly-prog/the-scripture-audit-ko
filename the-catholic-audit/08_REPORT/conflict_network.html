
    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="utf-8">
        <title>가톨릭 교리 충돌 네트워크 시각화 (The Catholic Audit)</title>
        <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
        <style type="text/css">
            body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; }
            #header { padding: 15px 20px; background-color: #2c3e50; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.5); position: absolute; z-index: 10; border-radius: 5px; margin: 20px; }
            #mynetwork { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
            h1 { margin: 0 0 10px 0; font-size: 1.2rem; }
            p { margin: 0; font-size: 0.9rem; color: #bdc3c7; }
        </style>
    </head>
    <body>
        <div id="header">
            <h1>🛡️ The Catholic Audit - 교리 충돌 네트워크</h1>
            <p>점(Node)은 교리 문헌을, 선(Edge)은 상호 논리적 모순(A Not A)을 의미합니다.<br>노드에 마우스를 올리면 충돌하는 텍스트 원문을 볼 수 있습니다.</p>
        </div>
        <div id="mynetwork"></div>
        <script type="text/javascript">
            var nodes = new vis.DataSet([{"id": "UNAM-SANCTAM", "label": "UNAM-SANCTAM"}, {"id": "CCC-0847", "label": "CCC-0847"}, {"id": "LG-16", "label": "LG-16"}, {"id": "CDF-RESPONSUM", "label": "CDF-RESPONSUM"}, {"id": "PAPAL-FIDUCIA", "label": "PAPAL-FIDUCIA"}, {"id": "DIGNITATIS-HUMANAE", "label": "DIGNITATIS-HUMANAE"}, {"id": "DENZINGER-SYLLABUS", "label": "DENZINGER-SYLLABUS"}, {"id": "CCC-1861", "label": "CCC-1861"}, {"id": "AMORIS-LAETITIA-CH8", "label": "AMORIS-LAETITIA-CH8"}]);
            var edges = new vis.DataSet([{"from": "UNAM-SANCTAM", "to": "CCC-0847", "value": 5.58, "title": "<div style='max-width:400px;'><b>[A\uc758 \uc8fc\uc7a5]</b><br>\ud558\ub098\uc774\uace0 \uac70\ub8e9\ud55c \uac00\ud1a8\ub9ad \uc0ac\ub3c4 \uad50\ud68c \ubc16\uc5d0\ub294 \uad6c\uc6d0\ub3c4, \uc8c4\uc758 \uc0ac\ud568\ub3c4 \uc5c6\ub2e4 (Extra Ecclesiam nulla salus)<br><br><b>[B\uc758 \ubd80\uc815]</b><br>\uad50\ud68c \ubc16\uc5d0\ub294 \uc5b4\ub5a4 \uad6c\uc6d0\ub3c4 \uc808\ub300\uc801\uc73c\ub85c \ubd88\uac00\ub2a5\ud558\ub2e4 (Extra Ecclesiam nulla salus\uc758 \uc808\ub300\uc801 \ud574\uc11d)</div>"}, {"from": "UNAM-SANCTAM", "to": "LG-16", "value": 5.28, "title": "<div style='max-width:400px;'><b>[A\uc758 \uc8fc\uc7a5]</b><br>\ud558\ub098\uc774\uace0 \uac70\ub8e9\ud55c \uac00\ud1a8\ub9ad \uc0ac\ub3c4 \uad50\ud68c \ubc16\uc5d0\ub294 \uad6c\uc6d0\ub3c4, \uc8c4\uc758 \uc0ac\ud568\ub3c4 \uc5c6\ub2e4 (Extra Ecclesiam nulla salus)<br><br><b>[B\uc758 \ubd80\uc815]</b><br>\uac00\uc2dc\uc801 \uad50\ud68c \ubc16\uc5d0\ub294 \uad6c\uc6d0\uc774 \uc804\ud600 \uc5c6\ub2e4\ub294 \uc5c4\uaca9\ud55c \ud574\uc11d (Extra Ecclesiam nulla salus\uc758 \ubc30\ud0c0\uc801 \ud574\uc11d)</div>"}, {"from": "CDF-RESPONSUM", "to": "PAPAL-FIDUCIA", "value": 2.8100000000000005, "title": "<div style='max-width:400px;'><b>[A\uc758 \uc8fc\uc7a5]</b><br>\uad50\ud68c\uc758 \ucd95\ubcf5\uc740 \uc624\uc9c1 \ub3c4\ub355\ubc95\uacfc \ud63c\uc778 \uad50\ub9ac(\ub0a8\ub140)\uc5d0 \ubd80\ud569\ud558\ub294 \uad00\uacc4\uc5d0\ub9cc \uc8fc\uc5b4\uc9c8 \uc218 \uc788\ub2e4.<br><br><b>[B\uc758 \ubd80\uc815]</b><br>\uad50\ud68c\uc758 \ucd95\ubcf5\uc740 \uc624\uc9c1 \ub3c4\ub355\uc801\uc73c\ub85c \uc644\uc804\ud55c \uc0c1\ud0dc\uc5d0 \uc788\ub294 \uc790\ub4e4\uc5d0\uac8c\ub9cc \uc8fc\uc5b4\uc838\uc57c \ud55c\ub2e4.</div>"}, {"from": "DIGNITATIS-HUMANAE", "to": "DENZINGER-SYLLABUS", "value": 2.7300000000000004, "title": "<div style='max-width:400px;'><b>[A\uc758 \uc8fc\uc7a5]</b><br>\ubaa8\ub4e0 \uc778\uac04\uc740 \uc885\uad50 \uc790\uc720\uc5d0 \ub300\ud55c \uad8c\ub9ac\ub97c \uac00\uc9c4\ub2e4<br><br><b>[B\uc758 \ubd80\uc815]</b><br>\ubaa8\ub4e0 \uc778\uac04\uc740 \uc790\uc2e0\uc758 \uc591\uc2ec\uc5d0 \ub530\ub77c \uc885\uad50\ub97c \uc120\ud0dd\ud558\uace0 \uacf5\uc801\uc73c\ub85c \uc608\ubc30\ud560 \uc218 \uc788\ub294 \uc885\uad50 \uc790\uc720\uc758 \uad8c\ub9ac\ub97c \uac00\uc9c4\ub2e4 (\uc81c2\ucc28 \ubc14\ud2f0\uce78 \uacf5\uc758\ud68c Dignitatis Humanae\uc758 \ud575\uc2ec \uc8fc\uc7a5\uacfc \uc644\ubcbd\ud788 \ucda9\ub3cc).</div>"}, {"from": "CCC-1861", "to": "AMORIS-LAETITIA-CH8", "value": 2.56, "title": "<div style='max-width:400px;'><b>[A\uc758 \uc8fc\uc7a5]</b><br>\uc778\uac04\uc740 \ub300\uc8c4\ub97c \ud1b5\ud574 \uc740\ucd1d\uc758 \uc0c1\ud0dc\ub97c \uc783\uc744 \uc218 \uc788\ub2e4 (\uad6c\uc6d0\uc758 \uc0c1\uc2e4 \uac00\ub2a5\uc131)<br><br><b>[B\uc758 \ubd80\uc815]</b><br>\uac1d\uad00\uc801 \uc0c1\ud0dc\ub9cc\uc73c\ub85c \uc740\ucd1d\uc758 \uc0c1\ud0dc\ub97c \ud310\ub2e8\ud560 \uc218 \uc788\ub2e4\ub294 \uba85\uc81c</div>"}]);
            var container = document.getElementById('mynetwork');
            var data = { nodes: nodes, edges: edges };
            var options = {
                nodes: {
                    shape: 'dot', size: 25, 
                    font: { size: 14, color: '#ecf0f1', face: 'arial' },
                    borderWidth: 2, 
                    color: { border: '#e74c3c', background: '#c0392b', highlight: { border: '#f1c40f', background: '#e67e22' } }
                },
                edges: {
                    color: { color: '#34495e', highlight: '#f1c40f', hover: '#e74c3c' },
                    smooth: { type: 'dynamic' }
                },
                interaction: { hover: true, tooltipDelay: 200 },
                physics: { 
                    stabilization: false, 
                    barnesHut: { gravitationalConstant: -30000, centralGravity: 0.3, springLength: 150 } 
                }
            };
            var network = new vis.Network(container, data, options);
        </script>
    </body>
    </html>
